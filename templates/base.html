{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Islan.DEV Digital Solutions{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Full-stack web development and business analysis for small and medium enterprises. Custom dashboards, SOPs, and digital workflows tailored to how your business actually operates.{% endblock %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/site.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col bg-brand-bg text-brand-text font-sans">
  {% include 'partials/navbar.html' %}

  <main class="flex-1">
    {% block content %}{% endblock %}
  </main>

  {% include 'partials/footer.html' %}

  {% block extra_body %}{% endblock %}
</body>
</html>
