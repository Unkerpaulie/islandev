{# Featured-work teaser. Hardcoded for now; will be swapped to read the Project model in Phase 4. #}
<section class="bg-white py-20 border-t border-brand-cyan/10">
  <div class="max-w-7xl mx-auto px-6">
    <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-12">
      <div>
        <p class="text-xs font-semibold tracking-widest text-brand-teal uppercase mb-2">Featured Work</p>
        <h2 class="text-3xl lg:text-4xl font-semibold text-brand-text tracking-tight">Real Systems for Real Businesses</h2>
      </div>
      <a href="{% url 'portfolio:list' %}"
         class="text-sm font-medium text-brand-teal hover:text-brand-cyan transition-colors flex items-center gap-1 flex-shrink-0">
        View full portfolio
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      {% for project in featured_projects %}
        <div class="group rounded-xl overflow-hidden border border-gray-100 shadow-sm hover:shadow-lg transition-all duration-300">
          <div class="relative overflow-hidden h-48">
            <img src="{{ project.img }}" alt="{{ project.title }}"
                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
            <div class="absolute inset-0 bg-brand-teal/0 group-hover:bg-brand-teal/10 transition-colors duration-300"></div>
          </div>
          <div class="p-5 bg-brand-bg">
            <p class="text-xs text-brand-teal font-medium mb-1">{{ project.type }}</p>
            <h3 class="font-semibold text-brand-text mb-2">{{ project.title }}</h3>
            <p class="text-sm text-brand-sub leading-relaxed">{{ project.desc }}</p>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
