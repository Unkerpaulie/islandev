<section class="relative overflow-hidden bg-brand-bg border-b border-brand-alloy/60">
  <div class="max-w-7xl mx-auto px-6 py-20 grid grid-cols-1 lg:grid-cols-2 gap-0 items-center min-h-[320px]">
    <div class="relative z-10 pr-0 lg:pr-12">
      {% if badge %}
        <p class="text-xs font-semibold tracking-widest text-brand-teal uppercase mb-4">{{ badge }}</p>
      {% endif %}
      <h1 class="text-4xl lg:text-5xl font-semibold text-brand-text tracking-tight mb-5 leading-tight">
        {{ title }}
      </h1>
      {% if subtitle %}
        <p class="text-lg text-brand-sub leading-relaxed max-w-xl">{{ subtitle }}</p>
      {% endif %}
    </div>

    {# TODO: replace the base44 CDN image with a local static asset. #}
    <div class="hidden lg:block relative h-64 lg:h-72">
      <img src="https://media.base44.com/images/public/6a14934cd034978bb3c4cb7e/d60481040_generated_image.png"
           alt=""
           class="absolute inset-0 w-full h-full object-cover object-left rounded-xl shadow-lg">
      <div class="absolute inset-0 rounded-xl"
           style="background: linear-gradient(to right, #ECEDF0 0%, transparent 35%);"></div>
    </div>
  </div>
</section>
