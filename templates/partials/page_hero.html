{% load static %}
{# Hero section — full-bleed, sits beneath the transparent fixed navbar. #}
<section class="min-h-screen bg-brand-bg flex items-center pt-16 relative overflow-hidden">
  <div class="max-w-7xl mx-auto px-6 w-full py-20 relative">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
      <div class="relative z-10">
        {% if badge %}
          <p class="text-xs font-semibold tracking-widest text-brand-teal uppercase mb-4">{{ badge }}</p>
        {% endif %}
        <h1 class="text-4xl lg:text-5xl xl:text-6xl font-semibold text-brand-text leading-tight tracking-tight mb-6">
          {{ title }}
        </h1>
        {% if subtitle %}
          <p class="text-lg text-gray-700 leading-relaxed mb-8 max-w-xl">
            {{ subtitle }}
          </p>
        {% endif %}
      </div>

      <div class="hidden lg:block" style="position:absolute; right:0; top:50%; transform:translateY(-50%); width:58%;">
        <div class="relative rounded-xl overflow-hidden">
          <img src="{% static 'images/services.png' %}"
               alt=""
               class="w-full h-auto block">
          <div class="absolute inset-0"
               style="background: linear-gradient(to right, #ECEDF0 0%, rgba(236,237,240,0) 45%);"></div>
        </div>
      </div>
    </div>
  </div>
</section>
